<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>BPO Recording System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #2b26c1; --bg: #f4f7fe; --blue: #4d44ff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        /* GIỮ NGUYÊN GIAO DIỆN TÍM CŨ */
        .sidebar { width: 260px; background: var(--sidebar); color: white; padding-top: 20px; flex-shrink: 0; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; }
        .nav-item.active { background: rgba(255,255,255,0.1); color: white; border-left: 4px solid white; }
        .nav-item i { margin-right: 15px; width: 20px; text-align: center; }
        .main { flex: 1; padding: 25px; overflow-y: auto; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .card-title { font-weight: bold; color: #1a1c3d; border-left: 4px solid var(--blue); padding-left: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .info-box { background: #f8fafc; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; min-height: 20px; font-size: 13px; color: #333; font-weight: 600; }
        input[type="text"], select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; outline: none; background: #f8fafc; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; margin-top: 10px; }
        th { text-align: left; padding: 12px; color: #a0aec0; font-size: 11px; border-bottom: 1px solid #f1f5f9; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #f8fafc; font-size: 13px; color: #4a5568; }
    </style>
</head>
<body>
    <div class="sidebar">
        <a href="#" class="nav-item active"><i class="fas fa-microphone"></i> Recording BPO PT</a>
        <a href="#" class="nav-item"><i class="fas fa-wallet"></i> Total VND Request</a>
        <a href="#" class="nav-item"><i class="fas fa-chart-line"></i> Fill rate</a>
    </div>
    <div class="main">
        <div class="container">
            <div class="card">
                <div class="card-title">INPUT WFM ID <span id="stt" style="color:#e74c3c; font-size: 12px;">🔴 Connecting...</span></div>
                <div style="margin-bottom:15px;">
                    <label style="font-size:11px; font-weight:bold;">BPO STAFF ID (Mã QH - Cột A)</label>
                    <input type="text" id="wfmInput" placeholder="Dán mã và Enter..." autocomplete="off">
                </div>
            </div>
            <div class="card">
                <div class="card-title">BPO PT INFORMATION</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px;">
                    <div><label style="font-size:11px;">VENDOR</label><div class="info-box" id="resVendor">-</div></div>
                    <div><label style="font-size:11px;">FULL NAME</label><div class="info-box" id="resName">-</div></div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div><label style="font-size:11px;">WFM ID</label><div class="info-box" id="resID">-</div></div>
                    <div><label style="font-size:11px;">USER WFM ID</label><div class="info-box" id="resUserID">-</div></div>
                </div>
                <div style="margin-top:10px;"><label style="font-size:11px;">WFM EMAIL</label><div class="info-box" id="resEmail">-</div></div>
            </div>
        </div>
        <div class="card" style="padding:0;"><div class="card-title" style="margin:20px 0 0 20px;">DATA ENTRY LOGS</div>
            <table><thead><tr><th>Time</th><th>WFM ID</th><th>Full name</th><th>Status</th></tr></thead>
            <tbody id="logList"></tbody></table>
        </div>
    </div>

    <script>
        // DÙNG ID FILE MỚI NHẤT CỦA ÔNG
        const SPREADSHEET_ID = '1kRh0lpQ02cqYgnWvn5TZojmDtfbtHGOflM4QTn3710M'; 
        let db = [];
        const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        async function init() {
            try {
                // Thêm timestamp để ép Google xóa cache
                const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&gid=0&cache=${new Date().getTime()}`;
                const res = await fetch(url);
                const text = await res.text();
                
                // Tách dòng CSV
                db = text.split(/\r?\n/).map(row => 
                    row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/^"|"$/g, '').trim())
                );

                if(db.length > 1) {
                    document.getElementById('stt').innerText = "🟢 Data Ready";
                    document.getElementById('stt').style.color = "#10b981";
                }
            } catch (e) {
                document.getElementById('stt').innerText = "🔴 Lỗi kết nối!";
            }
        }

        document.getElementById('wfmInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const val = this.value.trim();
                if (!val) return;

                // Tìm mã QH ở cột A (index 0)
                const f = db.find(row => row[0] === val);

                if (f) {
                    audio.play();
                    // Mapping đúng cột: B=1, D=3, I=8, J=9, K=10
                    document.getElementById('resVendor').innerText = f[1] || "-";
                    document.getElementById('resName').innerText   = f[3] || "-";
                    document.getElementById('resID').innerText     = f[8] || "-";
                    document.getElementById('resUserID').innerText = f[9] || "-";
                    document.getElementById('resEmail').innerText  = f[10] || "-";

                    const log = `<tr><td>${new Date().toLocaleTimeString()}</td><td>${val}</td><td>${f[3]}</td><td style="color:#10b981">Success</td></tr>`;
                    document.getElementById('logList').insertAdjacentHTML('afterbegin', log);
                    this.value = '';
                } else {
                    alert("Không tìm thấy mã: " + val);
                }
            }
        });
        window.onload = init;
    </script>
</body>
</html>
