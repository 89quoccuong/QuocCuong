<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>BPO SYSTEM - FINAL RECOVERY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #13163a; --bg: #f4f7fe; --primary: #4d44ff; --border: #e0e5f2; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar); color: white; padding-top: 20px; flex-shrink: 0; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; color: rgba(255,255,255,0.7); margin: 5px 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .nav-item.active { background: var(--primary); color: white; }
        .nav-item i { margin-right: 15px; width: 20px; text-align: center; }
        .container { flex: 1; position: relative; overflow: hidden; }
        .main-content { position: absolute; inset: 0; padding: 25px; overflow-y: auto; display: none; }
        .main-content.active { display: block; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); margin-bottom: 25px; }
        .card-title { font-weight: bold; color: #1b2559; border-left: 4px solid var(--primary); padding-left: 15px; margin-bottom: 20px; text-transform: uppercase; font-size: 13px; }
        label { display: block; font-size: 11px; font-weight: 800; color: #1b2559; margin-bottom: 8px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 12px; font-weight: 600; color: #1b2559; box-sizing: border-box; }
        .btn-confirm { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; }
        .info-box { background: #f8fafc; padding: 12px; border-radius: 12px; border: 1px solid var(--border); font-weight: bold; min-height: 20px; color: #1b2559; margin-bottom: 10px; font-size: 13px; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { text-align: left; padding: 12px; color: #a3abc1; font-size: 10px; border-bottom: 1px solid #f1f5f9; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #f8fafc; font-size: 12px; color: #1b2559; font-weight: 600; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="nav-item active" onclick="switchTab('recording', this)"><i class="fas fa-microphone"></i> Recording BPO PT</div>
        <div class="nav-item" onclick="switchTab('request', this)"><i class="fas fa-wallet"></i> Total VND Request</div>
        <div class="nav-item" onclick="switchTab('database', this)"><i class="fas fa-database"></i> BPO Database</div>
    </div>

    <div class="container">
        <div id="recording" class="main-content active">
            <div style="display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px;">
                <div class="card">
                    <div class="card-title">INPUT WFM ID</div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                        <div style="grid-column: span 2;"><label>DATE SYNC</label><input type="date" id="inputDate"></div>
                        <div><label>WH</label><select id="wh"><option>VNDB</option><option>VNDL</option></select></div>
                        <div><label>TEAM</label><select id="team"><option>Inbound</option><option>Inventory</option><option>FD</option><option>Outbound</option><option>HSE</option></select></div>
                        <div><label>TIME</label><select id="time"></select></div>
                        <div><label>SHIFT</label><select id="shift"><option>Day</option><option>Night</option></select></div>
                    </div>
                    <label style="margin-top:10px;">WFM ID (TRA CỘT I)</label>
                    <input type="text" id="wfmInput" placeholder="Đợi giây lát để load data rồi gõ..." onkeypress="if(event.key==='Enter') checkT1()">
                    <button class="btn-confirm" id="btnSave" onclick="saveT1()">CONFIRM</button>
                </div>
                <div class="card">
                    <div class="card-title">INFO DETAILS</div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <div><label>VENDOR</label><div class="info-box" id="res_vendor">-</div></div>
                        <div><label>NAME</label><div class="info-box" id="res_name">-</div></div>
                        <div><label>WFM ID</label><div class="info-box" id="res_wfm">-</div></div>
                        <div><label>USER WFM ID</label><div class="info-box" id="res_user">-</div></div>
                    </div>
                    <label>STATUS</label><div class="info-box" id="t1_status" style="color: var(--primary);">LOADING DATA...</div>
                </div>
            </div>
            <div class="card" style="padding:0; overflow-x:auto;">
                <table>
                    <thead><tr><th>DATE</th><th>TIME</th><th>WH</th><th>TEAM</th><th>VENDOR</th><th>WFM ID</th><th>USER ID</th><th>NAME</th></tr></thead>
                    <tbody id="logList"></tbody>
                </table>
            </div>
        </div>

        <div id="request" class="main-content">
            <div class="card">
                <div class="card-title">FILTER DATA REQUEST</div>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                    <div><label>Date</label><input type="date" id="reqDate"></div>
                    <div><label>Warehouse</label><select id="reqWh"><option value="">Tất cả</option><option>VNDB</option><option>VNDL</option></select></div>
                    <div><label>Team</label><select id="reqTeam"><option value="">Tất cả</option><option>Inbound</option><option>Inventory</option><option>FD</option><option>Outbound</option><option>HSE</option></select></div>
                </div>
                <button class="btn-confirm" onclick="loadT2()" style="margin-top:15px;">SEARCH DATA</button>
            </div>
            <div class="card" style="padding:0; overflow-x:auto;">
                <table>
                    <thead>
                        <tr><th>DATE</th><th>STATION</th><th>VENDORS</th><th>TEAM</th><th>TASK</th><th>START</th><th>END</th><th>LOẠI CTV</th><th>WFM BOOKING</th><th>ID USER</th></tr>
                    </thead>
                    <tbody id="t2_body"></tbody>
                </table>
            </div>
        </div>

        <div id="database" class="main-content">
            <div class="card">
                <div class="card-title">MASTER DATABASE</div>
                <div style="display: flex; gap:15px; align-items: flex-end;">
                    <div style="flex:1;"><label>Date Filter</label><input type="date" id="dbDate" onchange="loadT3()"></div>
                    <button class="btn-confirm" onclick="loadT3()" style="width:150px;">REFRESH DATA</button>
                </div>
            </div>
            <div class="card" style="padding:0; overflow-x:auto;">
                <table>
                    <thead><tr><th>DATE</th><th>TIME</th><th>WH</th><th>TEAM</th><th>VENDOR</th><th>WFM ID</th><th>USER ID</th><th>NAME</th></tr></thead>
                    <tbody id="t3_body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw6hz0b-i1Y_rHEYZT9BVRHBSmx4n2xIHrAM-0XSj2QthRyugu6Tv2szkzR4lGkjLxI/exec';
        const CSV_T1 = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRBb-hERkDWpd9_BufMG0ZK2idUC5e76qCz7wk96ybqHbrnrG1_xylG3JGWu0Vjor-DKNB1v2uCEG2C/pub?gid=0&single=true&output=csv';
        const CSV_T2 = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRBb-hERkDWpd9_BufMG0ZK2idUC5e76qCz7wk96ybqHbrnrG1_xylG3JGWu0Vjor-DKNB1v2uCEG2C/pub?gid=915514461&single=true&output=csv';
        
        let dataT1 = [], dataT2 = [], isLoaded = false;

        window.onload = () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('inputDate').value = today;
            document.getElementById('reqDate').value = today;
            document.getElementById('dbDate').value = today;
            
            // Fill time
            const sel = document.getElementById('time');
            for(let i=0; i<48; i++) {
                let h = Math.floor(i/2).toString().padStart(2,'0'), m = i%2==0?'00':'30';
                sel.add(new Option(`${h}:${m}`, `${h}:${m}`));
            }
            preload();
            loadT3();
        };

        function preload() {
            Papa.parse(CSV_T1, {
                download: true,
                complete: function(res) {
                    dataT1 = res.data;
                    isLoaded = true;
                    document.getElementById('t1_status').innerText = "READY";
                    console.log("CSV 1 Loaded");
                }
            });
            Papa.parse(CSV_T2, {
                download: true,
                complete: function(res) {
                    dataT2 = res.data;
                    console.log("CSV 2 Loaded");
                }
            });
        }

        function checkT1() {
            if(!isLoaded) return alert("Đang tải dữ liệu, chờ tí!");
            const val = document.getElementById('wfmInput').value.trim().toUpperCase();
            if(!val) return;

            // Tìm ở cột I (Index 8)
            const row = dataT1.find(r => r[8] && r[8].toString().trim().toUpperCase() === val);
            if(row) {
                document.getElementById('res_vendor').innerText = row[1] || "-";
                document.getElementById('res_name').innerText = row[3] || "-";
                document.getElementById('res_wfm').innerText = val;
                document.getElementById('res_user').innerText = row[9] || "-";
                document.getElementById('t1_status').innerText = "✅ FOUND";
                document.getElementById('t1_status').style.color = "green";
            } else {
                alert("Không thấy mã này trong Database!");
                document.getElementById('t1_status').innerText = "❌ NOT FOUND";
                document.getElementById('t1_status').style.color = "red";
            }
        }

        async function saveT1() {
            const wfm = document.getElementById('res_wfm').innerText;
            if(wfm === "-") return alert("Hãy tra mã WFM trước!");

            const params = new URLSearchParams({
                date: document.getElementById('inputDate').value,
                time: document.getElementById('time').value,
                wh: document.getElementById('wh').value,
                team: document.getElementById('team').value,
                vendor: document.getElementById('res_vendor').innerText,
                wfmId: wfm,
                userId: document.getElementById('res_user').innerText,
                name: document.getElementById('res_name').innerText
            });

            document.getElementById('t1_status').innerText = "SAVING...";
            await fetch(`${SCRIPT_URL}?${params.toString()}`, { method: 'GET', mode: 'no-cors' });
            
            document.getElementById('t1_status').innerText = "DONE!";
            document.getElementById('wfmInput').value = "";
            loadT3();
        }

        function loadT2() {
            const fDate = document.getElementById('reqDate').value;
            if(!fDate) return;
            const [y, m, d] = fDate.split('-');
            const searchStr = `${d}/${m}/${y}`; // Chuyển về dd/mm/yyyy như trong ảnh
            
            const filtered = dataT2.filter(r => r[0] && r[0].trim() === searchStr);
            // Render 10 cột, bỏ cột H (index 7)
            document.getElementById('t2_body').innerHTML = filtered.map(r => `
                <tr>
                    <td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td>
                    <td>${r[5]}</td><td>${r[6]}</td><td>${r[8]}</td><td>${r[9]}</td><td>${r[10]}</td>
                </tr>
            `).join('');
        }

        async function loadT3() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                const html = data.reverse().map(r => `
                    <tr>
                        <td>${r.date}</td><td>${r.time}</td><td>${r.wh}</td><td>${r.team}</td>
                        <td>${r.vendor}</td><td>${r.wfmId}</td><td>${r.userId}</td><td>${r.name}</td>
                    </tr>
                `).join('');
                document.getElementById('t3_body').innerHTML = html;
                document.getElementById('logList').innerHTML = html;
            } catch (e) { console.error("T3 error"); }
        }

        function switchTab(id, el) {
            document.querySelectorAll('.main-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(id === 'database') loadT3();
        }
    </script>
</body>
</html>
