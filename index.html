<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>BPO SYSTEM - ORIGINAL RESTORED</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #13163a; --bg: #f4f7fe; --primary: #4d44ff; --text-gray: #a3abc1; --danger: #ff5252; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar); color: white; padding-top: 20px; flex-shrink: 0; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; color: rgba(255,255,255,0.7); margin: 5px 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .nav-item.active { background: var(--primary); color: white; }
        .nav-item i { margin-right: 15px; width: 20px; text-align: center; }
        .container { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .main-content { position: absolute; inset: 0; padding: 25px; overflow-y: auto; display: none; }
        .main-content.active { display: block; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); margin-bottom: 25px; }
        .card-title { font-weight: bold; color: #1b2559; border-left: 4px solid var(--primary); padding-left: 15px; margin-bottom: 20px; text-transform: uppercase; font-size: 14px; }
        label { display: block; font-size: 11px; font-weight: 800; color: #1b2559; margin-bottom: 8px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e0e5f2; border-radius: 12px; margin-bottom: 10px; font-size: 13px; font-weight: 600; }
        .btn-confirm { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; }
        .info-box { background: #f8fafc; padding: 12px; border-radius: 12px; border: 1px solid #e0e5f2; font-weight: bold; min-height: 20px; color: #1b2559; margin-bottom: 10px; font-size: 13px; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { text-align: left; padding: 15px 12px; color: var(--text-gray); font-size: 10px; border-bottom: 1px solid #f1f5f9; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #f8fafc; font-size: 12px; color: #1b2559; font-weight: 600; }
        .btn-delete { color: var(--danger); cursor: pointer; border: none; background: none; font-size: 16px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="nav-item active" onclick="switchTab('recording', this)"><i class="fas fa-microphone"></i> Recording BPO PT</div>
        <div class="nav-item" onclick="switchTab('request', this)"><i class="fas fa-wallet"></i> Total VND Request</div>
        <div class="nav-item" onclick="switchTab('database', this)"><i class="fas fa-database"></i> BPO Database</div>
    </div>

    <div class="container">
        <div id="recording" class="main-content active">
            <div style="display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px;">
                <div class="card">
                    <div class="card-title">INPUT DATA</div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                        <div><label>WH</label><select id="wh"><option>VNDB</option><option>VNDL</option></select></div>
                        <div><label>TEAM</label><select id="team"><option>Inbound</option><option>Inventory</option><option>FD</option><option>OB</option></select></div>
                        <div><label>TIME</label><select id="time"></select></div>
                    </div>
                    <label>SCAN WFM ID</label>
                    <input type="text" id="wfmInput" placeholder="Enter WFM ID..." onkeypress="if(event.key==='Enter') checkInfo()">
                    <button class="btn-confirm" onclick="handleConfirm()">CONFIRM</button>
                </div>
                <div class="card">
                    <div class="card-title">INFO DETAILS</div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                        <div><label>VENDOR</label><div class="info-box" id="resVendor">-</div></div>
                        <div><label>NAME</label><div class="info-box" id="resName">-</div></div>
                    </div>
                    <label>STATUS</label><div class="info-box" id="resStatus" style="color: blue;">READY</div>
                </div>
            </div>
            <div class="card">
                <div class="card-title">TODAY DATA</div>
                <div style="overflow-x:auto"><table><thead><tr><th>DATE</th><th>TIME</th><th>WH</th><th>TEAM</th><th>VENDOR</th><th>ID</th><th>NAME</th><th>XÓA</th></tr></thead><tbody id="syncBody"></tbody></table></div>
            </div>
        </div>

        <div id="request" class="main-content">
            <div class="card">
                <div class="card-title">FILTER DATA REQUEST</div>
                <div style="display: flex; gap: 15px; align-items: flex-end;">
                    <div style="flex: 1;"><label>DATE</label><input type="date" id="reqDate"></div>
                    <button class="btn-confirm" onclick="searchRequest()" style="width: auto; padding: 12px 40px;">SEARCH</button>
                </div>
            </div>
            <div class="card">
                <div class="card-title">SUMMARY REPORT</div>
                <div style="overflow-x:auto"><table><thead><tr><th>Date</th><th>Station</th><th>Vendor</th><th>Team</th><th>WFM Booking</th></tr></thead><tbody id="reqBody"></tbody></table></div>
            </div>
        </div>

        <div id="database" class="main-content">
            <div class="card">
                <div class="card-title">BPO MASTER DATABASE</div>
                <div style="overflow-x:auto"><table><thead><tr><th>DATE</th><th>TIME</th><th>WH</th><th>TEAM</th><th>VENDOR</th><th>ID</th><th>NAME</th><th>XÓA</th></tr></thead><tbody id="masterBody"></tbody></table></div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzD_0i8LKndaGLiGvrzGUmZGNT3R7E4PTj-yUSA8qKD_It0NLz9OABlYAZY0pHzofFW/exec';
        const CSV_PT_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRBb-hERkDWpd9_BufMG0ZK2idUC5e76qCz7wk96ybqHbrnrG1_xylG3JGWu0Vjor-DKNB1v2uCEG2C/pub?gid=0&single=true&output=csv';
        const CSV_TASK2_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRBb-hERkDWpd9_BufMG0ZK2idUC5e76qCz7wk96ybqHbrnrG1_xylG3JGWu0Vjor-DKNB1v2uCEG2C/pub?gid=915514461&single=true&output=csv';

        let cachedData = [];
        let dataPT = [];
        let current = null;

        window.onload = () => {
            for(let i=0; i<48; i++) {
                let h = Math.floor(i/2).toString().padStart(2,'0'), m = i%2==0?'00':'30';
                document.getElementById('time').add(new Option(`${h}:${m}`, `${h}:${m}`));
            }
            Papa.parse(CSV_PT_URL, { download: true, complete: res => { dataPT = res.data; } });
            fetchServerData();
        };

        async function fetchServerData() {
            const res = await fetch(SCRIPT_URL);
            cachedData = await res.json();
            renderTodayTable();
        }

        function checkInfo() {
            const id = document.getElementById('wfmInput').value.trim().toUpperCase();
            const f = dataPT.find(r => r[8] == id);
            if(f) {
                current = { vendor: f[1], wfmId: f[8], userId: f[9], name: f[3], wh: document.getElementById('wh').value, team: document.getElementById('team').value, time: document.getElementById('time').value };
                document.getElementById('resVendor').innerText = current.vendor;
                document.getElementById('resName').innerText = current.name;
                document.getElementById('resStatus').innerText = "✅ OK";
            }
        }

        async function handleConfirm() {
            if(!current) return;
            document.getElementById('resStatus').innerText = "SAVING...";
            const today = new Date().toLocaleDateString('en-CA');
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: new URLSearchParams({...current, date: today}) });
            document.getElementById('wfmInput').value = ""; current = null;
            document.getElementById('resStatus').innerText = "READY";
            fetchServerData();
        }

        async function deleteRow(rowId) {
            if(!confirm("Xóa dòng này trong DATA PT?")) return;
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: new URLSearchParams({ method: 'DELETE', rowId: rowId }) });
            fetchServerData();
        }

        function renderTodayTable() {
            const today = new Date().toLocaleDateString('en-CA');
            const filtered = cachedData.filter(r => (r.date.includes('T') ? r.date.split('T')[0] : r.date) === today);
            document.getElementById('syncBody').innerHTML = filtered.map(r => `<tr><td>${r.date.split('T')[0]}</td><td>${r.time}</td><td>${r.wh}</td><td>${r.team}</td><td>${r.vendor}</td><td>${r.wfmId}</td><td>${r.name}</td><td><button class="btn-delete" onclick="deleteRow(${r.rowId})"><i class="fas fa-trash"></i></button></td></tr>`).reverse().join('');
        }

        function searchRequest() {
            const fDate = document.getElementById('reqDate').value;
            Papa.parse(CSV_TASK2_URL, {
                download: true, complete: res => {
                    const rows = res.data.slice(1);
                    const filtered = rows.filter(r => r[0] === formatSheetDate(fDate));
                    document.getElementById('reqBody').innerHTML = filtered.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[9]}</td></tr>`).join('');
                }
            });
        }

        function formatSheetDate(s) { if(!s) return ""; const [y,m,d] = s.split('-'); return `${d}/${m}/${y}`; }

        function switchTab(t, el) {
            document.querySelectorAll('.main-content').forEach(c => c.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(t === 'database') {
                document.getElementById('masterBody').innerHTML = cachedData.map(r => `<tr><td>${r.date.split('T')[0]}</td><td>${r.time}</td><td>${r.wh}</td><td>${r.team}</td><td>${r.vendor}</td><td>${r.wfmId}</td><td>${r.name}</td><td><button class="btn-delete" onclick="deleteRow(${r.rowId})"><i class="fas fa-trash"></i></button></td></tr>`).reverse().join('');
            }
        }
    </script>
</body>
</html>
