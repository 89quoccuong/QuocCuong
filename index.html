<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>BPO Recording System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #1a1c3d; --bg: #f4f7fe; --blue: #4d44ff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: #2b26c1; color: white; padding: 20px 0; flex-shrink: 0; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; }
        .nav-item.active { background: rgba(255,255,255,0.1); color: white; border-left: 4px solid white; }
        .nav-item i { margin-right: 15px; width: 20px; text-align: center; }
        .main { flex: 1; padding: 25px; overflow-y: auto; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); position: relative; }
        .card-title { font-weight: bold; color: #1a1c3d; border-left: 4px solid var(--blue); padding-left: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .status-tag { font-size: 12px; font-weight: bold; }
        .scan-btns { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; background: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; }
        .btn-in { color: #10b981; border-color: #d1fae5; background: #f0fdf4; }
        .btn-out { color: #a0aec0; background: #f8fafc; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #1a1c3d; margin-bottom: 5px; text-transform: uppercase; }
        .info-box { background: #f8fafc; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; min-height: 18px; font-size: 13px; font-weight: 500; color: #333; }
        input[type="text"], select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; outline: none; box-sizing: border-box; background: #f8fafc; }
        .radio-group { display: flex; gap: 10px; align-items: center; height: 38px; }
        .radio-group label { text-transform: none; font-weight: normal; margin-bottom: 0; display: flex; align-items: center; gap: 4px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; margin-top: 10px; }
        th { text-align: left; padding: 12px; color: #a0aec0; font-size: 11px; border-bottom: 1px solid #f1f5f9; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #f8fafc; font-size: 13px; color: #4a5568; }
    </style>
</head>
<body>
    <div class="sidebar">
        <a href="#" class="nav-item active"><i class="fas fa-microphone"></i> Recording BPO PT</a>
        <a href="#" class="nav-item"><i class="fas fa-wallet"></i> Total VND Request</a>
        <a href="#" class="nav-item"><i class="fas fa-chart-line"></i> Fill rate</a>
    </div>
    <div class="main">
        <div class="container">
            <div class="card">
                <div class="card-title">INPUT WFM ID <span id="stt" class="status-tag" style="color:#e74c3c;">🔴 Connecting...</span></div>
                <div class="scan-btns">
                    <button class="btn btn-in"><i class="fas fa-sign-in-alt"></i> SCAN IN</button>
                    <button class="btn btn-out"><i class="fas fa-sign-out-alt"></i> SCAN OUT</button>
                </div>
                <div class="grid-inputs">
                    <div>
                        <label>Project Code</label>
                        <div class="radio-group">
                            <label><input type="radio" name="pj" value="VNDB" checked> VNDB</label>
                            <label><input type="radio" name="pj" value="VNDL"> VNDL</label>
                        </div>
                    </div>
                    <div><label>Time</label><select id="tSelect"><option>09:00</option></select></div>
                    <div>
                        <label>Shift</label>
                        <div class="radio-group">
                            <label><input type="radio" name="sh" value="Day" checked> Day</label>
                            <label><input type="radio" name="sh" value="Night"> Night</label>
                        </div>
                    </div>
                </div>
                <label>BPO Staff ID (WFM ID)</label>
                <input type="text" id="wfmInput" placeholder="Dán mã WFM và nhấn Enter..." autocomplete="off">
            </div>
            <div class="card">
                <div class="card-title">BPO PT INFORMATION</div>
                <div class="grid-inputs" style="grid-template-columns: 1fr 1fr;">
                    <div><label>VENDOR</label><div class="info-box" id="resVendor">-</div></div>
                    <div><label>FULL NAME</label><div class="info-box" id="resName">-</div></div>
                </div>
                <div class="grid-inputs" style="grid-template-columns: 1fr 1fr;">
                    <div><label>WFM ID</label><div class="info-box" id="resID">-</div></div>
                    <div><label>USER WFM ID</label><div class="info-box" id="resUserID">-</div></div>
                </div>
                <label>WFM EMAIL</label><div class="info-box" id="resEmail">-</div>
            </div>
        </div>
        <div class="card" style="padding:0;"><div class="card-title" style="margin:20px 0 0 20px;">DATA ENTRY LOGS</div>
            <table><thead><tr><th>Scanned At</th><th>Warehouse</th><th>WFM ID</th><th>Full name</th><th>Scan Type</th><th>Status</th></tr></thead>
            <tbody id="logList"></tbody></table>
        </div>
    </div>
    <script>
        // SỬ DỤNG QUERY GOOGLE SHEETS ĐỂ TRÁNH LỖI KẾT NỐI
        const SPREADSHEET_ID = '1jE1fj-KGVs0n69XIFVaMGgJeJsssCLWU1awFkCFs35g';
        const QUERY_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&gid=0`;
        
        let db = [];
        const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        async function init() {
            try {
                const r = await fetch(QUERY_URL);
                if (!r.ok) throw new Error();
                const t = await r.text();
                // Xử lý dữ liệu bỏ dấu ngoặc kép
                db = t.split('\n').map(row => row.split(',').map(cell => cell.replace(/"/g, '').trim()));
                document.getElementById('stt').innerText = "🟢 Data Ready";
                document.getElementById('stt').style.color = "#10b981";
            } catch (e) {
                document.getElementById('stt').innerText = "🔴 Lỗi kết nối!";
            }
        }

        document.getElementById('wfmInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const id = this.value.trim();
                const f = db.find(r => r[0] === id);
                if (f) {
                    audio.play();
                    document.getElementById('resID').innerText = f[0];
                    document.getElementById('resVendor').innerText = f[1];
                    document.getElementById('resName').innerText = f[2];
                    document.getElementById('resUserID').innerText = f[3];
                    document.getElementById('resEmail').innerText = f[4];
                    const pj = document.querySelector('input[name="pj"]:checked').value;
                    const row = `<tr><td>${new Date().toLocaleTimeString()}</td><td>${pj}</td><td>${f[0]}</td><td>${f[2]}</td><td>IN</td><td style="color:#10b981;font-weight:bold">Success</td></tr>`;
                    document.getElementById('logList').insertAdjacentHTML('afterbegin', row);
                    this.value = '';
                } else { alert("Không tìm thấy mã: " + id); }
            }
        });
        window.onload = init;
    </script>
</body>
</html>
