<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>BPO SYSTEM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #13163a; --bg: #f4f7fe; --primary: #4d44ff; --text-gray: #a3abc1; --danger: #ff5252; --success: #2ecc71; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar); color: white; padding-top: 20px; flex-shrink: 0; z-index: 100; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; color: rgba(255,255,255,0.7); margin: 5px 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .nav-item.active { background: var(--primary); color: white; }
        .nav-item i { margin-right: 15px; width: 20px; text-align: center; }
        .container { flex: 1; position: relative; overflow: hidden; }
        .main-content { position: absolute; inset: 0; padding: 25px; overflow-y: auto; display: none; }
        .main-content.active { display: block; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); margin-bottom: 25px; }
        .card-title { font-weight: bold; color: #1b2559; border-left: 4px solid var(--primary); padding-left: 15px; margin-bottom: 20px; text-transform: uppercase; font-size: 14px; }
        label { display: block; font-size: 11px; font-weight: 800; color: #1b2559; margin-bottom: 8px; text-transform: uppercase; }
        input[type="text"], input[type="date"], select { width: 100%; padding: 12px; border: 1px solid #e0e5f2; border-radius: 12px; font-weight: 600; color: #1b2559; box-sizing: border-box; margin-bottom: 10px; }
        .btn-confirm { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-search { background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-download { background: var(--success); color: white; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .info-box { background: #f8fafc; padding: 12px; border-radius: 12px; border: 1px solid #e0e5f2; font-weight: bold; min-height: 20px; color: #1b2559; margin-bottom: 10px; font-size: 13px; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { text-align: left; padding: 12px; color: var(--text-gray); font-size: 10px; border-bottom: 1px solid #f1f5f9; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #f8fafc; font-size: 12px; color: #1b2559; font-weight: 600; }
        .check-group { display: flex; gap: 15px; background: #f8fafc; padding: 10px; border-radius: 12px; border: 1px solid #e0e5f2; flex-wrap: wrap; }
        .check-item { display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 700; color: #1b2559; }
        .check-item input { width: 16px; height: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="nav-item active" onclick="switchTab('recording', this)"><i class="fas fa-microphone"></i> Recording BPO PT</div>
        <div class="nav-item" onclick="switchTab('request', this)"><i class="fas fa-wallet"></i> Total VND Request</div>
        <div class="nav-item" onclick="switchTab('database', this)"><i class="fas fa-database"></i> BPO Database</div>
    </div>

    <div class="container">
        <div id="recording" class="main-content active">
            <div style="display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px;">
                <div class="card">
                    <div class="card-title">INPUT WFM ID</div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                        <div style="grid-column: span 2;"><label>DATE SYNC</label><input type="date" id="inputDate"></div>
                        <div><label>WH</label><select id="wh"><option>VNDB</option><option>VNDL</option></select></div>
                        <div><label>TEAM</label><select id="team"><option>Inbound</option><option>Inventory</option><option>FD</option><option>OB</option></select></div>
                        <div><label>TIME</label><select id="time"></select></div>
                        <div><label>SHIFT</label><select id="shift"><option>Day</option><option>Night</option></select></div>
                    </div>
                    <input type="text" id="wfmInput" placeholder="Nhập WFM rồi Enter..." onkeypress="if(event.key==='Enter') checkInfo()">
                    <button class="btn-confirm" onclick="handleConfirm()">CONFIRM DATA</button>
                </div>
                <div class="card">
                    <div class="card-title">INFO</div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                        <div><label>VENDOR</label><div class="info-box" id="resVendor">-</div></div>
                        <div><label>NAME</label><div class="info-box" id="resName">-</div></div>
                        <div><label>ID (WFM)</label><div class="info-box" id="resID">-</div></div>
                        <div><label>USER WFM ID</label><div class="info-box" id="resUserId">-</div></div>
                    </div>
                    <label>EMAIL</label><div class="info-box" id="resEmail">-</div>
                    <label>STATUS</label><div class="info-box" id="resStatus">READY</div>
                </div>
            </div>
            <div class="card" style="padding:0; overflow-x:auto;">
                <table>
                    <thead><tr><th>DATE</th><th>TIME</th><th>WH</th><th>TEAM</th><th>VENDOR</th><th>ID</th><th>USER ID</th><th>NAME</th><th style="text-align:center">ACTION</th><th>STATUS</th></tr></thead>
                    <tbody id="logList"></tbody>
                </table>
            </div>
        </div>

        <div id="request" class="main-content">
            <div class="card">
                <div class="card-title">FILTER DATA REQUEST (MULTI-SELECT)</div>
                <div style="display: flex; flex-direction: column; gap: 15px;">
                    <div><label>Date</label><input type="date" id="reqDate" style="width: 200px;"></div>
                    <div>
                        <label>Warehouse (Chọn nhiều)</label>
                        <div class="check-group" id="reqWhGroup">
                            <label class="check-item"><input type="checkbox" value="VNDB" checked> VNDB</label>
                            <label class="check-item"><input type="checkbox" value="VNDL" checked> VNDL</label>
                        </div>
                    </div>
                    <div>
                        <label>Team (Chọn nhiều)</label>
                        <div class="check-group" id="reqTeamGroup">
                            <label class="check-item"><input type="checkbox" value="Inbound" checked> Inbound</label>
                            <label class="check-item"><input type="checkbox" value="Inventory" checked> Inventory</label>
                            <label class="check-item"><input type="checkbox" value="FD" checked> FD</label>
                            <label class="check-item"><input type="checkbox" value="OB" checked> OB</label>
                        </div>
                    </div>
                    <button class="btn-search" onclick="loadRequestData()" style="width: 150px;">SEARCH</button>
                </div>
            </div>
            <div class="card" style="padding:0; overflow-x:auto;">
                <table>
                    <thead><tr><th>Date</th><th>WH</th><th>Vendor</th><th>Team</th><th>Task</th><th>WFM ID</th><th>User ID</th></tr></thead>
                    <tbody id="reqBody"></tbody>
                </table>
            </div>
        </div>

        <div id="database" class="main-content">
            <div class="card">
                <div class="card-title">BPO MASTER DATABASE</div>
                <div style="display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 15px; align-items: flex-end;">
                    <div><label>Filter Date</label><input type="date" id="dbDate" onchange="renderMaster()"></div>
                    <button class="btn-search" onclick="loadSharedDB()">REFRESH</button>
                    <button class="btn-download" onclick="downloadDB()">DOWNLOAD CSV</button>
                </div>
            </div>
            <div class="card" style="padding:0; overflow-x:auto;">
                <table>
                    <thead><tr><th>DATE</th><th>TIME</th><th>WH</th><th>TEAM</th><th>VENDOR</th><th>WFM ID</th><th>USER ID</th><th>FULL NAME</th></tr></thead>
                    <tbody id="masterBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz7L87IUMGmtAW-_QERDUh88oND7P60Uzmk0cAbLzEFFwbX5ETBw0MzTSixLttsxaxh/exec';
        const CSV_PT_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRBb-hERkDWpd9_BufMG0ZK2idUC5e76qCz7wk96ybqHbrnrG1_xylG3JGWu0Vjor-DKNB1v2uCEG2C/pub?gid=0&single=true&output=csv';
        const CSV_COMMIT_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRBb-hERkDWpd9_BufMG0ZK2idUC5e76qCz7wk96ybqHbrnrG1_xylG3JGWu0Vjor-DKNB1v2uCEG2C/pub?gid=915514461&single=true&output=csv';
        
        let dataPT = [], dataCommit = [], masterData = [], currentPending = null;

        window.onload = () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('inputDate').value = today;
            document.getElementById('reqDate').value = today;
            document.getElementById('dbDate').value = today;
            fillTime(); preloadData(); loadSharedDB();
        };

        function fillTime() {
            const sel = document.getElementById('time');
            for(let i=0; i<48; i++) {
                let h = Math.floor(i/2).toString().padStart(2,'0'), m = i%2==0?'00':'30';
                sel.add(new Option(`${h}:${m}`, `${h}:${m}`));
            }
        }

        async function preloadData() {
            Papa.parse(CSV_PT_URL, { download: true, complete: res => dataPT = res.data });
            Papa.parse(CSV_COMMIT_URL, { download: true, complete: res => dataCommit = res.data });
        }

        function checkInfo() {
            const id = document.getElementById('wfmInput').value.trim().toUpperCase();
            const found = dataPT.find(r => r[8] && r[8].trim().toUpperCase() === id);
            if(found) {
                currentPending = {
                    date: document.getElementById('inputDate').value,
                    time: document.getElementById('time').value,
                    wh: document.getElementById('wh').value,
                    team: document.getElementById('team').value,
                    shift: document.getElementById('shift').value,
                    vendor: found[1], wfmId: found[8], userId: found[9] || "N/A", name: found[3], email: found[10]
                };
                document.getElementById('resName').innerText = currentPending.name;
                document.getElementById('resVendor').innerText = currentPending.vendor;
                document.getElementById('resID').innerText = currentPending.wfmId;
                document.getElementById('resUserId').innerText = currentPending.userId;
                document.getElementById('resEmail').innerText = currentPending.email;
                document.getElementById('resStatus').innerText = "VUI LÒNG BẤM CONFIRM!";
            } else { alert("Không tìm thấy!"); }
        }

        async function handleConfirm() {
            if(!currentPending) return alert("Nhập mã WFM rồi Enter trước!");
            document.getElementById('resStatus').innerText = "ĐANG LƯU...";
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: new URLSearchParams(currentPending) });
            document.getElementById('resStatus').innerText = "ĐÃ LƯU XONG!";
            document.getElementById('wfmInput').value = "";
            currentPending = null;
            await loadSharedDB();
        }

        async function loadSharedDB() {
            const res = await fetch(SCRIPT_URL);
            masterData = await res.json();
            renderLogs(); renderMaster();
        }

        function renderLogs() {
            const target = document.getElementById('inputDate').value;
            const filtered = masterData.filter(r => r.date === target);
            document.getElementById('logList').innerHTML = filtered.map(l => `<tr><td>${l.date}</td><td>${l.time}</td><td>${l.wh}</td><td>${l.team}</td><td>${l.vendor}</td><td>${l.wfmId}</td><td>${l.userId}</td><td>${l.name}</td><td style="text-align:center"><button style="border:none; background:none; color:red; cursor:pointer;"><i class="fas fa-trash-can"></i></button></td><td style="color:green">OK</td></tr>`).join('');
        }

        function renderMaster() {
            const target = document.getElementById('dbDate').value;
            const filtered = masterData.filter(r => r.date === target);
            document.getElementById('masterBody').innerHTML = filtered.map(r => `<tr><td>${r.date}</td><td>${r.time}</td><td>${r.wh}</td><td>${r.team}</td><td>${r.vendor}</td><td>${r.wfmId}</td><td>${r.userId}</td><td>${r.name}</td></tr>`).join('');
        }

        function loadRequestData() {
            const dVal = document.getElementById('reqDate').value;
            if(!dVal) return;
            const selectedWh = Array.from(document.querySelectorAll('#reqWhGroup input:checked')).map(i => i.value);
            const selectedTeam = Array.from(document.querySelectorAll('#reqTeamGroup input:checked')).map(i => i.value);
            
            const [y, m, d] = dVal.split('-');
            const s1 = `${parseInt(d)}/${parseInt(m)}/${y}`; // Kiểu 1/3/2026
            const s2 = `${d.padStart(2,'0')}/${m.padStart(2,'0')}/${y}`; // Kiểu 01/03/2026

            const filtered = dataCommit.filter(r => {
                const cellDate = r[0] ? r[0].trim() : "";
                const matchDate = (cellDate === s1 || cellDate === s2);
                const matchWh = selectedWh.some(wh => r[1] && r[1].trim().includes(wh));
                const matchTeam = selectedTeam.some(tm => r[3] && r[3].trim().includes(tm));
                return matchDate && matchWh && matchTeam;
            });
            
            document.getElementById('reqBody').innerHTML = filtered.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td>${r[8]}</td><td>${r[9]}</td></tr>`).join('');
        }

        function downloadDB() {
            let csv = "\uFEFFDATE,TIME,WH,TEAM,VENDOR,WFM ID,USER ID,NAME\n";
            masterData.forEach(r => csv += `"${r.date}","${r.time}","${r.wh}","${r.team}","${r.vendor}","${r.wfmId}","${r.userId}","${r.name}"\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `BPO_DB.csv`;
            link.click();
        }

        function switchTab(t, el) {
            document.querySelectorAll('.main-content').forEach(c => c.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
