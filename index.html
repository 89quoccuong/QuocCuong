<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>BPO Recording System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #1a1c3d; --bg: #f4f7fe; --blue: #4d44ff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: #1a1c3d; color: white; padding-top: 20px; flex-shrink: 0; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; margin: 5px 15px; border-radius: 8px; }
        .nav-item.active { background: var(--blue); color: white; }
        .nav-item i { margin-right: 15px; width: 20px; text-align: center; }
        .main { flex: 1; padding: 25px; overflow-y: auto; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); position: relative; }
        .card-title { font-weight: bold; color: #1a1c3d; border-left: 4px solid var(--blue); padding-left: 15px; margin-bottom: 25px; text-transform: uppercase; font-size: 16px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn-scan { padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; background: #f8fafc; color: #a0aec0; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-scan.active { background: #f0fdf4; border-color: #d1fae5; color: #10b981; }
        .btn-confirm { width: 100%; padding: 15px; border: none; border-radius: 10px; background: var(--blue); color: white; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 15px; box-shadow: 0 4px 15px rgba(77, 68, 255, 0.3); }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #1a1c3d; margin-bottom: 8px; text-transform: uppercase; }
        .info-box { background: #f8fafc; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; min-height: 20px; font-size: 13px; color: #333; font-weight: 600; }
        input[type="text"], select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; box-sizing: border-box; font-size: 14px; }
        input[type="text"]:focus { border-color: var(--blue); }
        .radio-group { display: flex; gap: 15px; font-size: 12px; align-items: center; font-weight: 600; padding: 5px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 15px; color: #a0aec0; font-size: 11px; border-bottom: 1px solid #f1f5f9; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #f8fafc; font-size: 13px; color: #4a5568; }
        .tag-in { background: #f0fdf4; color: #10b981; padding: 4px 8px; border-radius: 6px; font-weight: bold; font-size: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <a href="#" class="nav-item active"><i class="fas fa-microphone"></i> Recording BPO PT</a>
        <a href="#" class="nav-item"><i class="fas fa-wallet"></i> Total VND Request</a>
        <a href="#" class="nav-item"><i class="fas fa-chart-line"></i> Fill rate</a>
    </div>
    <div class="main">
        <div class="container">
            <div class="card">
                <div class="card-title">INPUT WFM ID <span id="stt" style="color:#10b981; font-size: 10px; margin-left:10px;">🟢 Data Ready</span></div>
                <div class="btn-group">
                    <div class="btn-scan active" id="btnIn"><i class="fas fa-sign-in"></i> SCAN IN</div>
                    <div class="btn-scan" id="btnOut"><i class="fas fa-sign-out-alt"></i> SCAN OUT</div>
                </div>
                
                <div class="grid-inputs">
                    <div><label>Project Code</label>
                        <div class="radio-group">
                            <label style="margin:0;"><input type="radio" name="pj" value="VNDB" checked> VNDB</label>
                            <label style="margin:0;"><input type="radio" name="pj" value="VNDL"> VNDL</label>
                        </div>
                    </div>
                    <div><label>Time</label><select id="timeSelect"><option>09:00</option><option>13:00</option><option>21:00</option></select></div>
                    <div><label>Shift</label>
                        <div class="radio-group">
                            <label style="margin:0;"><input type="radio" name="sh" value="Day" checked> Day</label>
                            <label style="margin:0;"><input type="radio" name="sh" value="Night"> Night</label>
                        </div>
                    </div>
                </div>

                <div style="margin-bottom: 20px; padding: 10px; background: #f8fafc; border-radius: 10px;">
                    <label>Team Selection</label>
                    <div class="radio-group">
                        <label style="margin:0;"><input type="radio" name="team" value="Inbound" checked> Inbound</label>
                        <label style="margin:0; margin-left:10px;"><input type="radio" name="team" value="Inventory"> Inventory</label>
                        <label style="margin:0; margin-left:10px;"><input type="radio" name="team" value="FD"> FD</label>
                    </div>
                </div>

                <label>BPO Staff ID (WFM ID)</label>
                <input type="text" id="wfmInput" placeholder="Input WFM, please..." autocomplete="off">
                <button class="btn-confirm" onclick="handleConfirm()">CONFIRM</button>
            </div>

            <div class="card">
                <div class="card-title">BPO PT INFORMATION</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:15px;">
                    <div><label>VENDOR</label><div class="info-box" id="resVendor">-</div></div>
                    <div><label>FULL NAME</label><div class="info-box" id="resName">-</div></div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:15px;">
                    <div><label>WFM ID</label><div class="info-box" id="resID">-</div></div>
                    <div><label>USER WFM ID</label><div class="info-box" id="resUserID">-</div></div>
                </div>
                <label>WFM EMAIL</label><div class="info-box" id="resEmail">-</div>
            </div>
        </div>

        <div class="card" style="padding:0;"><div class="card-title" style="margin:25px 0 0 25px;">DATA ENTRY LOGS</div>
            <table><thead><tr><th>Scanned At</th><th>Warehouse</th><th>Team</th><th>WFM ID</th><th>Full name</th><th>Scan Type</th><th>Status</th></tr></thead>
            <tbody id="logList"></tbody></table>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRBb-hERkDWpd9_BufMG0ZK2idUC5e76qCz7wk96ybqHbrnrG1_xylG3JGWu0Vjor-DKNB1v2uCEG2C/pub?gid=0&single=true&output=csv';
        let db = [];
        let scanMode = "IN";
        const audioSuccess = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        async function init() {
            try {
                const res = await fetch(`${CSV_URL}&t=${new Date().getTime()}`);
                const data = await res.text();
                db = data.split(/\r?\n/).map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim()));
            } catch (e) { console.error("Lỗi data"); }
        }

        document.getElementById('btnIn').onclick = function() { this.classList.add('active'); document.getElementById('btnOut').classList.remove('active'); scanMode = "IN"; };
        document.getElementById('btnOut').onclick = function() { this.classList.add('active'); document.getElementById('btnIn').classList.remove('active'); scanMode = "OUT"; };

        function handleConfirm() {
            const val = document.getElementById('wfmInput').value.trim();
            if (!val) return;
            const f = db.find(row => row[8] === val); // Check cột I

            if (f) {
                audioSuccess.play();
                document.getElementById('resVendor').innerText = f[1] || "-";
                document.getElementById('resName').innerText   = f[3] || "-";
                document.getElementById('resID').innerText     = f[8] || "-";
                document.getElementById('resUserID').innerText = f[9] || "-";
                document.getElementById('resEmail').innerText  = f[10] || "-";

                const now = new Date();
                const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
                const pj = document.querySelector('input[name="pj"]:checked').value;
                const team = document.querySelector('input[name="team"]:checked').value;

                const log = `<tr>
                    <td>${timeStr}</td>
                    <td style="color:var(--blue); font-weight:bold;">${pj}</td>
                    <td>${team}</td>
                    <td>${val}</td>
                    <td>${f[3]}</td>
                    <td><span class="tag-in" style="${scanMode === 'OUT' ? 'background:#fee2e2;color:#ef4444;' : ''}">${scanMode}</span></td>
                    <td style="color:#10b981; font-weight:bold;">Thành công</td>
                </tr>`;
                document.getElementById('logList').insertAdjacentHTML('afterbegin', log);
                document.getElementById('wfmInput').value = '';
            } else { alert("Không tìm thấy!"); }
        }

        document.getElementById('wfmInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleConfirm(); });
        window.onload = init;
    </script>
</body>
</html>
