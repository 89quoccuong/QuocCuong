<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>BPO Recording - Quoc Cuong</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #1a1c3d; --bg: #dbe2ef; --blue: #4d44ff; --success: #2ecc71; --error: #e74c3c; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 250px; background: var(--sidebar); color: white; padding: 20px 0; flex-shrink: 0; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; color: #aeb2cc; text-decoration: none; font-size: 14px; }
        .nav-item.active { background: var(--blue); color: white; border-radius: 0 50px 50px 0; margin-right: 10px; }
        .main { flex: 1; padding: 25px; overflow-y: auto; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .card-title { color: var(--sidebar); font-weight: bold; border-left: 4px solid var(--blue); padding-left: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .info-box { background: #f8f9fc; padding: 12px; border-radius: 8px; min-height: 20px; color: #333; font-weight: 600; border: 1px solid #f0f2f5; font-size: 14px; margin-bottom: 10px; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #e1e5ee; border-radius: 8px; outline: none; box-sizing: border-box; }
        label { display: block; font-size: 11px; color: #6c757d; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #a0aec0; font-size: 12px; padding: 12px; border-bottom: 1px solid #edf2f7; }
        td { padding: 12px; border-bottom: 1px solid #f7f9fc; font-size: 14px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="nav-item active"><i class="fas fa-microphone"></i> Recording BPO PT</div>
    </div>
    <div class="main">
        <div class="card">
            <div class="card-title">INPUT WFM ID <span id="stt" style="color: var(--error);">Connecting...</span></div>
            <label>BPO Staff ID (WFM ID)</label>
            <input type="text" id="wfmInput" placeholder="Nhập mã rồi Enter..." autocomplete="off">
        </div>
        <div class="card">
            <div class="card-title">INFORMATION</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div><label>VENDOR</label><div class="info-box" id="resVendor">-</div></div>
                <div><label>FULL NAME</label><div class="info-box" id="resName">-</div></div>
            </div>
        </div>
        <div class="card">
            <div class="card-title">LOGS</div>
            <table>
                <thead><tr><th>Time</th><th>ID</th><th>Name</th><th>Status</th></tr></thead>
                <tbody id="logList"></tbody>
            </table>
        </div>
    </div>
    <script>
        // LINK CSV ĐÃ FIX
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTj_oKLgnuBywkM3yef66KdvHfhYD1pAslJW76vbVWBnaZTCPl13XHgto9Op_-AkTjPAbvPPA0yE6rk/pub?gid=0&single=true&output=csv';
        let db = [];
        const ting = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        async function init() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                db = text.split('\n').filter(l => l.trim()).map(r => r.split(',').map(c => c.trim()));
                document.getElementById('stt').innerText = "Data Ready";
                document.getElementById('stt').style.color = "#2ecc71";
            } catch (e) { document.getElementById('stt').innerText = "Lỗi kết nối!"; }
        }

        document.getElementById('wfmInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const id = this.value.trim();
                const f = db.find(r => r[0] === id);
                if (f) {
                    ting.play();
                    document.getElementById('resVendor').innerText = f[1] || "-";
                    document.getElementById('resName').innerText = f[2] || "-";
                    const row = `<tr><td>${new Date().toLocaleTimeString()}</td><td>${f[0]}</td><td>${f[2]}</td><td style="color:green">Success</td></tr>`;
                    document.getElementById('logList').insertAdjacentHTML('afterbegin', row);
                    this.value = '';
                } else { alert("Không tìm thấy mã: " + id); }
            }
        });
        window.onload = init;
    </script>
</body>
</html>
